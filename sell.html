<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell - MA Store</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.topbar{
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{padding:15px;}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.preview{
  width:100%;
  margin-top:10px;
  border-radius:10px;
  display:none;
}
</style>
</head>
<body>

<div class="topbar">Sell Product</div>

<div class="container">

<div class="card">

<!-- IMAGE -->
<input type="file" id="file" accept="image/*" style="display:none;">
<button onclick="document.getElementById('file').click()">Add Image</button>

<img id="preview" class="preview">

<!-- DATA -->
<input id="price" placeholder="Price">
<textarea id="desc" placeholder="Description"></textarea>
<input id="contact" placeholder="WhatsApp number OR link">

<button onclick="upload()">Submit Post</button>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB9Jt_TdznUMTHQuZIZgy1WYSmJ1RyWasQ",
  authDomain: "ma-intelligence-6077c.firebaseapp.com",
  databaseURL: "https://ma-intelligence-6077c-default-rtdb.firebaseio.com",
  projectId: "ma-intelligence-6077c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let imageURL = "";

/* IMAGE SELECT */
document.getElementById("file").onchange = function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(ev){
    imageURL = ev.target.result;
    const img = document.getElementById("preview");
    img.src = imageURL;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);
};

/* UPLOAD */
function upload(){
  const city = localStorage.getItem("selectedCity");

  const price = document.getElementById("price").value;
  const desc = document.getElementById("desc").value;
  const contact = document.getElementById("contact").value;

  if(!price || !desc || !contact || !imageURL || !city){
    alert("Please fill all fields and select image + city");
    return;
  }

  const newPostRef = db.ref("posts").push();

  newPostRef.set({
    price: price,
    description: desc,
    contact: contact,
    imageURL: imageURL,
    city: city
  })
  .then(() => {
    alert("✅ Post Uploaded Successfully!");
    
    document.getElementById("price").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("contact").value = "";
    document.getElementById("preview").style.display = "none";
  })
  .catch((error) => {
    alert("❌ Upload Failed: " + error.message);
  });
}
</script>

</body>
</html>
