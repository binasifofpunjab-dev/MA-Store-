<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy - MA Store</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.topbar{
  background:black;color:white;
  padding:15px;text-align:center;
  font-size:22px;font-weight:bold;
}

.container{padding:15px;}

.search{
  width:94%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ccc;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

img{
  width:100%;
  border-radius:10px;
}

.price{font-weight:bold;margin-top:10px;}
.desc{margin-top:8px;color:#444;}

.city{font-size:13px;color:gray;margin-top:5px;}

a{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:black;
  color:white;
  text-decoration:none;
  border-radius:6px;
}
</style>
</head>
<body>

<div class="topbar">Buy Products</div>

<div class="container">

<input class="search" id="search" placeholder="Search products...">

<div id="products"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB9Jt_TdznUMTHQuZIZgy1WYSmJ1RyWasQ",
  authDomain: "ma-intelligence-6077c.firebaseapp.com",
  databaseURL: "https://ma-intelligence-6077c-default-rtdb.firebaseio.com",
  projectId: "ma-intelligence-6077c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const city = localStorage.getItem("selectedCity");

function getContactLink(contact){
  // if full link already
  if(contact.startsWith("http")){
    return contact;
  }
  // otherwise treat as whatsapp number
  return "https://wa.me/" + contact;
}

function load(){
  db.ref("posts").on("value", snap=>{
    const data = snap.val();
    const box = document.getElementById("products");
    box.innerHTML = "";

    if(!data) return;

    Object.values(data).forEach(p=>{
      if((p.city || "").trim().toLowerCase() === (city || "").trim().toLowerCase()){
        const div = document.createElement("div");
        div.className="card";

        const link = getContactLink(p.contact);

        div.innerHTML = `
          <img src="${p.imageURL}">
          <div class="price">Rs ${p.price}</div>
          <div class="desc">${p.description}</div>
          <div class="city">${p.city}</div>
          <a href="${link}" target="_blank">Contact Seller</a>
        `;

        box.appendChild(div);
      }
    });
  });
}

load();
</script>

</body>
</html>
