<!DOCTYPE html>
<html>
<head>
<title>MA Store</title>
<style>
body{margin:0;font-family:Arial;}
.top{background:black;color:white;padding:15px;font-size:20px;font-weight:bold;}
.card{text-align:center;padding:20px;}
img{width:100px;height:100px;border-radius:50%;}
.btn{padding:12px;width:90%;margin:10px;background:black;color:white;border:none;}
</style>
</head>
<body>

<div class="top">MA Store</div>

<div class="card">
<img id="img">
<h2 id="name"></h2>

<button class="btn" onclick="go('menu.html')">Buy / Sell</button>
<button class="btn" onclick="go('settings.html')">Settings</button>
<button class="btn" onclick="go('city.html')">Select City</button>

</div>

<script>
img.src=localStorage.getItem("userImage");
name.innerText=localStorage.getItem("userName");

function go(p){location.href=p;}
</script>

</body>
</html>
